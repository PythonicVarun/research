<!doctype html>
<html lang="en">
    <head>
        <script>
            (function () {
                const saved = localStorage.getItem("theme");
                if (saved !== "dark")
                    document.documentElement.classList.add("light-theme");
            })();
        </script>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404: Page Not Found — Varun Agnihotri</title>
        <meta
            name="description"
            content="Page not found on Varun Agnihotri's research lab site."
        />
        <link
            rel="icon"
            href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
            rel="stylesheet"
        />

        <style>
            :root {
                --bg-primary: #0a0a0f;
                --bg-secondary: #12121a;
                --bg-card: #1a1a28;
                --bg-card-hover: #222235;
                --bg-glass: rgba(26, 26, 40, 0.72);
                --text-primary: #e8e8f0;
                --text-secondary: #9a9ab0;
                --text-muted: #6a6a80;
                --accent-1: #7c5cfc; /* purple */
                --accent-2: #5c8afc; /* blue */
                --accent-3: #fc5c8a; /* pink */
                --accent-ok: #4cdb8a;
                --accent-warn: #fcb85c;
                --border: rgba(124, 92, 252, 0.18);
                --border-subtle: rgba(255, 255, 255, 0.06);
                --shadow-card: 0 4px 28px rgba(0, 0, 0, 0.35);
                --shadow-glow: 0 0 70px rgba(124, 92, 252, 0.12);
                --grad-hero: linear-gradient(
                    135deg,
                    #7c5cfc 0%,
                    #5c8afc 50%,
                    #fc5c8a 100%
                );
                --gradient-card: linear-gradient(
                    135deg,
                    rgba(124, 92, 252, 0.08) 0%,
                    rgba(92, 138, 252, 0.04) 100%
                );
                --font-body:
                    "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
                --font-mono: "JetBrains Mono", "Fira Code", monospace;
            }

            html.light-theme {
                --bg-primary: #f4f4fb;
                --bg-secondary: #ebebf5;
                --bg-card: #ffffff;
                --bg-card-hover: #f8f8ff;
                --bg-glass: rgba(255, 255, 255, 0.88);
                --text-primary: #1a1a2e;
                --text-secondary: #555570;
                --text-muted: #888898;
                --accent-1: #6a4ce0; /* purple */
                --accent-2: #4a72e0; /* blue */
                --accent-3: #e04a72; /* pink */
                --accent-ok: #2aaa66;
                --accent-warn: #d9952a;
                --border: rgba(106, 76, 224, 0.2);
                --border-subtle: rgba(0, 0, 0, 0.06);
                --shadow-card: 0 4px 28px rgba(0, 0, 0, 0.08);
                --shadow-glow: 0 0 70px rgba(106, 76, 224, 0.08);
                --gradient-card: linear-gradient(
                    135deg,
                    rgba(106, 76, 224, 0.06) 0%,
                    rgba(74, 114, 224, 0.03) 100%
                );
            }

            /* ===== RESET ===== */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                font-family: var(--font-body);
                background: var(--bg-primary);
                color: var(--text-primary);
                min-height: 100vh;
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
                display: flex;
                flex-direction: column;
            }

            @supports not (view-transition-name: root) {
                body {
                    transition:
                        background 0.3s,
                        color 0.3s;
                }
            }

            /* Override browser default view transitions cross-fade */
            ::view-transition-old(root),
            ::view-transition-new(root) {
                animation: none;
                mix-blend-mode: normal;
            }

            ::view-transition-new(root) {
                z-index: 9999;
            }

            ::view-transition-old(root) {
                z-index: 1;
            }

            a {
                color: inherit;
                text-decoration: none;
            }

            /* ===== AMBIENT GLOW ===== */
            .ambient {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: 0;
                overflow: hidden;
            }

            .ambient-blob {
                position: absolute;
                border-radius: 50%;
                filter: blur(100px);
                opacity: 0.12;
            }

            .ambient-blob-1 {
                width: 600px;
                height: 600px;
                background: var(--accent-1);
                top: -200px;
                left: -200px;
            }

            .ambient-blob-2 {
                width: 500px;
                height: 500px;
                background: var(--accent-2);
                bottom: -100px;
                right: -100px;
            }

            html.light-theme .ambient-blob {
                opacity: 0.06;
            }

            /* ===== LAYOUT ===== */
            .wrap {
                display: flex;
                justify-content: center;
                max-width: 1080px;
                margin: 0 auto;
                padding: 0 24px;
                position: relative;
                z-index: 1;
                width: 100%;
            }

            /* ===== NAV ===== */
            nav {
                position: sticky;
                top: 0;
                z-index: 100;
                background: var(--bg-glass);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--border-subtle);
            }

            .nav-inner {
                display: flex;
                align-items: center;
                justify-content: space-between;
                height: 56px;
                max-width: 1080px;
                margin: 0 auto;
                padding: 0 24px;
            }

            .nav-logo {
                font-family: var(--font-mono);
                font-size: 0.85rem;
                font-weight: 500;
                color: var(--text-secondary);
                letter-spacing: 0.02em;
            }

            .nav-logo span {
                color: var(--accent-1);
            }

            .nav-logo .cursor {
                display: inline-block;
                width: 7px;
                height: 0.9em;
                background: var(--accent-1);
                vertical-align: middle;
                margin-left: 2px;
                border-radius: 1px;
                animation: blink 1.1s step-end infinite;
            }

            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }

                50% {
                    opacity: 0;
                }
            }

            .nav-actions {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .nav-link {
                font-size: 0.8rem;
                font-weight: 500;
                color: var(--text-secondary);
                padding: 6px 12px;
                border-radius: 6px;
                border: 1px solid var(--border-subtle);
                transition:
                    color 0.2s,
                    border-color 0.2s,
                    background-color 0.2s;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .nav-link:hover {
                color: var(--text-primary);
                border-color: var(--border);
                background-color: var(--bg-card);
            }

            .theme-btn {
                width: 34px;
                height: 34px;
                border-radius: 8px;
                border: 1px solid var(--border-subtle);
                background-color: transparent;
                cursor: pointer;
                color: var(--text-secondary);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1rem;
                transition:
                    color 0.2s,
                    border-color 0.2s,
                    background-color 0.2s;
                position: relative;
                overflow: hidden;
            }

            .theme-btn:hover {
                color: var(--text-primary);
                border-color: var(--border);
                background-color: var(--bg-card);
            }

            .theme-btn span {
                position: absolute;
                transition:
                    transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            }

            .sun-icon {
                opacity: 0;
                transform: rotate(90deg) scale(0);
            }

            .moon-icon {
                opacity: 1;
                transform: rotate(0) scale(1);
            }

            .light-theme .sun-icon {
                opacity: 1;
                transform: rotate(0) scale(1);
            }

            .light-theme .moon-icon {
                opacity: 0;
                transform: rotate(-90deg) scale(0);
            }

            /* ===== 404 CONTENT ===== */
            .error-container {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 80px 0;
                text-align: center;
            }

            .error-card {
                background-image: var(--gradient-card);
                background-color: var(--bg-card);
                border: 1px solid var(--border-subtle);
                border-radius: 20px;
                padding: 48px 32px;
                max-width: 540px;
                width: 100%;
                box-shadow: var(--shadow-card);
                transition:
                    transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1),
                    border-color 0.4s cubic-bezier(0.25, 0.8, 0.25, 1),
                    box-shadow 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            }

            .error-card:hover {
                transform: translateY(-6px) scale(1.01);
                border-color: var(--border);
                box-shadow: var(--shadow-card), var(--shadow-glow);
            }

            .error-icon {
                font-size: 3.5rem;
                margin-bottom: 24px;
                line-height: 1;
                display: inline-block;
                transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
                transform-origin: center bottom;
            }

            .error-card:hover .error-icon {
                transform: scale(1.2) translateY(-4px) rotate(-8deg);
            }

            .error-code {
                font-family: var(--font-mono);
                font-size: clamp(3rem, 10vw, 5rem);
                font-weight: 800;
                line-height: 1;
                margin-bottom: 12px;
                background: var(--grad-hero);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            html.light-theme .error-code {
                filter: brightness(0.85);
            }

            .error-title {
                font-size: 1.5rem;
                font-weight: 700;
                color: var(--text-primary);
                margin-bottom: 16px;
                letter-spacing: -0.02em;
            }

            .error-desc {
                font-size: 0.92rem;
                color: var(--text-secondary);
                line-height: 1.65;
                margin-bottom: 32px;
            }

            .back-btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                background-color: var(--accent-1);
                color: #ffffff;
                font-size: 0.88rem;
                font-weight: 600;
                padding: 10px 24px;
                border-radius: 10px;
                cursor: pointer;
                transition:
                    transform 0.2s ease,
                    background-color 0.2s ease,
                    box-shadow 0.2s ease;
                box-shadow: 0 4px 14px rgba(124, 92, 252, 0.3);
            }

            html.light-theme .back-btn {
                box-shadow: 0 4px 14px rgba(106, 76, 224, 0.35);
            }

            .back-btn:hover {
                transform: translateY(-2px);
                background-color: var(--accent-2);
                box-shadow: 0 6px 20px rgba(92, 138, 252, 0.4);
            }

            .back-btn:active {
                transform: translateY(0);
            }

            /* ===== FOOTER ===== */
            footer {
                border-top: 1px solid var(--border-subtle);
                padding: 32px 0;
                position: relative;
                z-index: 1;
            }

            .footer-inner {
                display: flex;
                align-items: center;
                justify-content: space-between;
                max-width: 1080px;
                margin: 0 auto;
                padding: 0 24px;
                flex-wrap: wrap;
                gap: 12px;
            }

            .footer-left {
                font-family: var(--font-mono);
                font-size: 0.75rem;
                color: var(--text-muted);
                line-height: 1.7;
            }

            .footer-left a {
                color: var(--accent-1);
            }

            .footer-left a:hover {
                text-decoration: underline;
            }

            .footer-right {
                font-family: var(--font-mono);
                font-size: 0.72rem;
                color: var(--text-muted);
            }

            /* ===== RESPONSIVE ===== */
            @media (max-width: 600px) {
                .error-container {
                    padding: 48px 0;
                }

                .error-card {
                    padding: 36px 20px;
                }
            }

            /* ===== REDUCED MOTION ===== */
            @media (prefers-reduced-motion: reduce) {
                .cursor {
                    animation: none !important;
                }

                .error-card,
                .error-icon,
                .back-btn {
                    transition: none !important;
                }

                .error-card:hover,
                .error-card:hover .error-icon,
                .back-btn:hover {
                    transform: none !important;
                }
            }
        </style>
    </head>

    <body>
        <!-- ambient background -->
        <div class="ambient" aria-hidden="true">
            <div class="ambient-blob ambient-blob-1"></div>
            <div class="ambient-blob ambient-blob-2"></div>
        </div>

        <!-- nav -->
        <nav>
            <div class="nav-inner">
                <div class="nav-logo">
                    <a href="./">
                        <span>~/research</span>
                        <span class="cursor"></span>
                    </a>
                </div>
                <div class="nav-actions">
                    <a
                        class="nav-link"
                        href="https://github.com/PythonicVarun/research"
                        target="_blank"
                        rel="noopener"
                    >
                        <svg
                            width="14"
                            height="14"
                            viewBox="0 0 16 16"
                            fill="currentColor"
                        >
                            <path
                                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
                            />
                        </svg>
                        GitHub
                    </a>
                    <button
                        class="theme-btn"
                        id="themeBtn"
                        aria-label="Toggle theme"
                        title="Toggle theme"
                    >
                        <span class="sun-icon">☀️</span>
                        <span class="moon-icon">🌙</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- 404 content -->
        <main class="error-container">
            <div class="wrap">
                <div class="error-card">
                    <div class="error-icon">🕵️‍♂️</div>
                    <div class="error-code">404</div>
                    <h1 class="error-title">Unlogged Research Space</h1>
                    <p class="error-desc">
                        The resource you are looking for has either been moved,
                        redacted, or never existed in the repository logs.
                    </p>
                    <a href="./" class="back-btn"> ← Return to base </a>
                </div>
            </div>
        </main>

        <!-- footer -->
        <footer>
            <div class="footer-inner">
                <div class="footer-left">
                    Built by
                    <a
                        href="https://github.com/PythonicVarun"
                        target="_blank"
                        rel="noopener"
                        >Varun Agnihotri</a
                    >
                    &nbsp;·&nbsp; MIT License &nbsp;·&nbsp;
                    <a
                        href="https://github.com/PythonicVarun/research"
                        target="_blank"
                        rel="noopener"
                        >github.com/PythonicVarun/research</a
                    >
                </div>
                <div class="footer-right">research.pythonicvarun.me</div>
            </div>
        </footer>

        <script>
            // ===== THEME TOGGLE =====
            const btn = document.getElementById("themeBtn");

            function toggleTheme(event) {
                const isTransitionable =
                    document.startViewTransition &&
                    !window.matchMedia("(prefers-reduced-motion: reduce)")
                        .matches;

                if (!isTransitionable) {
                    const isLight =
                        document.documentElement.classList.toggle(
                            "light-theme",
                        );
                    localStorage.setItem("theme", isLight ? "light" : "dark");
                    return;
                }

                let x = window.innerWidth / 2;
                let y = window.innerHeight / 2;
                if (event) {
                    x = event.clientX;
                    y = event.clientY;
                }

                const endRadius = Math.hypot(
                    Math.max(x, window.innerWidth - x),
                    Math.max(y, window.innerHeight - y),
                );

                const transition = document.startViewTransition(() => {
                    const isLight =
                        document.documentElement.classList.toggle(
                            "light-theme",
                        );
                    localStorage.setItem("theme", isLight ? "light" : "dark");
                });

                transition.ready.then(() => {
                    document.documentElement.animate(
                        {
                            clipPath: [
                                `circle(0px at ${x}px ${y}px)`,
                                `circle(${endRadius}px at ${x}px ${y}px)`,
                            ],
                        },
                        {
                            duration: 650,
                            easing: "cubic-bezier(0.4, 0, 0.2, 1)",
                            pseudoElement: "::view-transition-new(root)",
                        },
                    );
                });
            }

            btn.addEventListener("click", (event) => {
                toggleTheme(event);
            });
        </script>
    </body>
</html>

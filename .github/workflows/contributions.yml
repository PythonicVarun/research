name: Generate Contributions Heatmap

on:
    schedule:
        - cron: "0 0 * * *"
          timezone: "Asia/Kolkata"
    workflow_dispatch:

jobs:
    update-contributions:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            commit_made: ${{ steps.commit_step.outputs.changes_made }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Run contributions generator
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: python .github/scripts/generate_contributions.py

            - name: Commit and push changes
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add contributions.json
                  if git diff --staged --quiet; then
                    echo "No changes in contributions.json. Skipping commit."
                    echo "changes_made=false" >> "$GITHUB_OUTPUT"
                  else
                    git commit -m "chore: update contributions.json"
                    git push
                    echo "changes_made=true" >> "$GITHUB_OUTPUT"
                  fi

    deploy:
        needs: update-contributions
        if: needs.update-contributions.outputs.commit_made == 'true'
        uses: ./.github/workflows/deploy.yml

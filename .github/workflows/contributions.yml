name: Generate Contributions Heatmap

on:
    schedule:
        # Runs daily at midnight IST
        - cron: "30 18 * * *"
    workflow_dispatch:

jobs:
    update-contributions:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Run contributions generator
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: python .github/scripts/generate_contributions.py

            - name: Commit and push changes
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "github-actions[bot]"
                  git add contributions.json
                  if git diff --staged --quiet; then
                    echo "No changes in contributions.json. Skipping commit."
                  else
                    git commit -m "chore: update contributions.json"
                    git push
                  fi

name: Deploy to GitHub Pages

on:
    push:
        branches:
            - master
    workflow_call:
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: master
                  fetch-depth: 1
                  submodules: recursive

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install minify
              run: sudo apt-get update && sudo apt-get install -y minify

            - name: Inject analytics tracker
              run: python .github/scripts/inject_tracker.py

            - name: Minify static files
              run: |
                  find . -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.json" \) -exec minify -o {} {} \;

            - name: Setup Pages
              uses: actions/configure-pages@v6

            - name: Upload pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: "."

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
